<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settla Solutions AS</title>
  <meta name="description" content="Settla Solutions AS – fremtidens bilforsikring. Vi kommer snart.">
  <meta name="theme-color" content="#eff6ff">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
      background-color: #eff6ff;
      color: #0f1b3d;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      letter-spacing: -0.01em;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 24px;
      text-align: center;
    }

    .mark {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0f1b3d;
      opacity: 0.55;
      margin-bottom: 40px;
    }

    .mark::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0f1b3d;
      opacity: 0.5;
      margin-right: 10px;
      vertical-align: middle;
      transform: translateY(-1px);
    }

    h1 {
      font-size: clamp(72px, 18vw, 184px);
      font-weight: 500;
      line-height: 0.95;
      letter-spacing: -0.045em;
      margin-bottom: 28px;
    }

    .subtitle {
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 400;
      letter-spacing: -0.01em;
      opacity: 0.82;
      margin-bottom: 44px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #0f1b3d;
      padding: 10px 18px;
      border: 1px solid rgba(15, 27, 61, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0f1b3d;
      position: relative;
    }

    .status .dot::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: #0f1b3d;
      opacity: 0.25;
      animation: pulse 2.4s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(0.6); opacity: 0.35; }
      80%  { transform: scale(2);   opacity: 0;    }
      100% { transform: scale(2);   opacity: 0;    }
    }

    footer {
      padding: 32px 24px 40px;
      font-size: 13.5px;
      line-height: 1.7;
      color: #0f1b3d;
      opacity: 0.7;
      text-align: center;
    }

    footer .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px 14px;
    }

    footer .sep {
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }

    footer .company {
      font-weight: 600;
      opacity: 1;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 27, 61, 0.25);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, opacity 0.2s ease;
    }

    footer a:hover {
      border-bottom-color: rgba(15, 27, 61, 0.9);
    }

    @media (max-width: 520px) {
      .mark {
        margin-bottom: 28px;
        font-size: 12px;
      }
      h1 {
        letter-spacing: -0.04em;
      }
      .subtitle {
        margin-bottom: 32px;
      }
      footer .sep {
        display: none;
      }
      footer .row {
        flex-direction: column;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <span class="mark">Settla Solutions</span>
    <h1>settla</h1>
    <p class="subtitle">Fremtidens bilforsikring</p>
    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      <span>Vi kommer snart.</span>
    </div>
  </main>

  <footer>
    <div class="row">
      <span class="company">Settla Solutions AS</span>
      <span class="sep" aria-hidden="true"></span>
      <span>Organisasjonsnummer: 931&nbsp;103&nbsp;814</span>
      <span class="sep" aria-hidden="true"></span>
     <a href="mailto:atle.timenes@settla.no">atle.timenes@settla.no</a>
    </div>
  </footer>
</body>
</html>
